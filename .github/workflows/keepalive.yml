# 保活 Render Free 层：每 10 分钟 ping 一次健康检查接口，
# 防止 15 分钟无请求后实例冷启动（冷启动会导致首次访问等待 30-60 秒）。
#
# 触发方式：
#   1. 定时 cron（默认每 10 分钟）
#   2. 手动触发（Actions 页面点 "Run workflow"）
#   3. 仅 master 分支
#
# 注意：GitHub Actions 计划任务在仓库长期无活动时可能被暂停，
#       如果保活失效，手动触发一次即可恢复。

name: Keep Render Alive

on:
  schedule:
    # 每 10 分钟执行一次（cron 语法：分 时 日 月 周）
    # 故意避开整点，避免所有用户同时请求
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging https://anime-website-a1iy.onrender.com/api/test/health ..."
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --max-time 60 \
            --retry 2 \
            --retry-delay 5 \
            https://anime-website-a1iy.onrender.com/api/test/health)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $(cat /tmp/response.json)"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ Keep-alive ping succeeded"
          else
            echo "❌ Keep-alive ping failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Ping root (SPA)
        run: |
          echo "Pinging root ..."
          curl -s -o /dev/null -w "Root HTTP: %{http_code}, time: %{time_total}s\n" \
            --max-time 60 \
            https://anime-website-a1iy.onrender.com/
